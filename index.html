<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ماشین حساب خرید و فروش</title>
  <style>
    * { box-sizing: border-box; font-family: "Vazirmatn", Tahoma, sans-serif; }

    :root{
      --bg1:#0f172a; --bg2:#1e293b; --bg3:#334155;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.15);
      --text:#ffffff;
      --muted:#cbd5e1;
      --muted2:#94a3b8;
      --input-bg: rgba(255,255,255,0.12);
      --input-bg-focus: rgba(255,255,255,0.18);
      --focus-ring: rgba(59,130,246,0.5);
      --accent1:#f59e0b; --accent2:#f97316;
      --shadow: 0 20px 50px rgba(0,0,0,0.35);
      --tab-bg: rgba(255,255,255,0.08);
      --details-bg: rgba(255,255,255,0.06);
      --result-bg: rgba(255,255,255,0.10);
      --divider: rgba(255,255,255,0.15);
      --price:#facc15;
    }

    body[data-theme="light"]{
      --bg1:#f8fafc; --bg2:#eef2ff; --bg3:#e2e8f0;
      --card: rgba(255,255,255,0.85);
      --card-border: rgba(15,23,42,0.08);
      --text:#0f172a;
      --muted:#334155;
      --muted2:#475569;
      --input-bg: rgba(15,23,42,0.06);
      --input-bg-focus: rgba(15,23,42,0.09);
      --focus-ring: rgba(37,99,235,0.35);
      --shadow: 0 18px 45px rgba(2,6,23,0.10);
      --tab-bg: rgba(15,23,42,0.06);
      --details-bg: rgba(15,23,42,0.04);
      --result-bg: rgba(15,23,42,0.04);
      --divider: rgba(15,23,42,0.12);
      --price:#b45309;
    }

    body{
      margin:0; min-height:100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
      display:flex; align-items:center; justify-content:center;
      color: var(--text);
      padding: 18px;
    }

    .card{
      width:100%; max-width: 520px;
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid var(--card-border);
      border-radius:24px;
      padding:22px 22px 28px;
      box-shadow: var(--shadow);
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom: 10px;
    }

    .title{
      font-size:22px;
      font-weight:900;
      margin:0;
      color: var(--text);
    }

    .theme-toggle{
      display:flex; align-items:center; gap:10px;
      color: var(--muted);
      font-size: 13px;
      user-select:none;
      white-space: nowrap;
      cursor: pointer;
    }

    .switch{
      position:relative;
      width: 52px;
      height: 30px;
      border-radius: 999px;
      background: var(--tab-bg);
      border: 1px solid var(--card-border);
      padding: 3px;
      transition: 0.25s;
      flex: 0 0 auto;
    }

    .knob{
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      transform: translateX(0);
      transition: transform 0.25s ease;
    }

    body[data-theme="light"] .knob{
      transform: translateX(-22px);
    }

    .subtitle{
      margin: 4px 0 18px;
      color: var(--muted2);
      font-size: 13px;
    }

    .tabs{
      display:flex; gap:8px;
      background: var(--tab-bg);
      border-radius:14px; padding:6px; margin-bottom:22px;
      border: 1px solid var(--card-border);
    }

    .tab-btn{
      flex:1; padding:12px; border:none; border-radius:10px;
      cursor:pointer; font-size:15px; font-weight:900;
      color: var(--text);
      background: transparent; transition: 0.25s;
    }

    .tab-btn.active{
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow: 0 8px 20px rgba(249,115,22,0.25);
      color: #fff;
    }

    .tab-content{ display:none; }
    .tab-content.active{ display:block; }

    .form-group{ margin-bottom:16px; }

    label{
      display:block; margin-bottom:8px;
      font-size:14px; color: var(--muted);
    }

    input{
      width:100%;
      padding:14px 16px;
      border:none; outline:none;
      border-radius:14px;
      background: var(--input-bg);
      color: var(--text);
      font-size:16px;
      transition:0.25s;
    }

    input::placeholder{
      color: var(--placeholder);
      opacity: 1;
}


    input:focus{
      background: var(--input-bg-focus);
      box-shadow: 0 0 0 2px var(--focus-ring);
    }

    .btn{
      width:100%;
      padding:14px;
      border:none; border-radius:14px;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      color:#fff;
      font-size:17px; font-weight:900;
      cursor:pointer; transition:0.25s; margin-top:8px;
    }

    .btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(249,115,22,0.28);
    }

    .result{
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      background: var(--result-bg);
      text-align:center;
      display:none;
      border: 1px solid var(--card-border);
    }

    .result h3{
      margin:0 0 10px;
      font-size:15px;
      color: var(--muted2);
      font-weight:600;
    }

    .price{
      font-size:28px;
      font-weight:950;
      color: var(--price);
    }

    .details{
      margin-top:14px;
      font-size:14px;
      color: var(--text);
      line-height:2;
      text-align:right;
      background: var(--details-bg);
      padding:12px;
      border-radius:12px;
      border: 1px solid var(--card-border);
    }

    .details hr{
      border:none;
      border-top:1px solid var(--divider);
      margin:10px 0;
    }

    .hint{
      margin-top:12px;
      text-align:center;
      font-size:12px;
      color: var(--muted2);
      line-height:1.8;
    }
    body[data-theme="light"] input::placeholder { 
        color: #888; 
        opacity: 1; 
    }
    body[data-theme="dark"] input::placeholder { 
        color: #a0a0a0; 
        opacity: 1; 
    }
  </style>
</head>

<body data-theme="dark">
  <div class="card">
    <div class="topbar">
      <h1 class="title">ماشین حساب خرید و فروش</h1>

      <div class="theme-toggle" onclick="toggleTheme()" role="button" aria-label="تغییر تم">
        <span id="themeLabel">دارک</span>
        <div class="switch" title="Dark/Light">
          <div class="knob"></div>
        </div>
      </div>
    </div>

    <div class="subtitle">تب فروش طبق فرمول شما محاسبه می‌شود</div>

    <div class="tabs">
      <button class="tab-btn" id="buyBtn" onclick="switchTab('buy')">خرید</button>
      <button class="tab-btn" id="sellBtn" onclick="switchTab('sell')">فروش</button>
    </div>

    <!-- تب خرید -->
    <div class="tab-content" id="buyTab">
      <div class="form-group">
        <label for="buyBasePrice">قیمت هر گرم ۲۴ عیار</label>
        <input type="number" id="buyBasePrice" placeholder="مثلاً 6500000" />
      </div>

      <div class="form-group">
        <label for="buyWeight">وزن (گرم)</label>
        <input type="text" id="buyWeight" inputmode="decimal" placeholder="مثلاً 7.5" />

      </div>

      <div class="form-group">
        <label for="buyKarat">عیار</label>
        <input type="number" id="buyKarat" placeholder="مثلاً 18" step="0.1" />
      </div>

      <button class="btn" onclick="calculateBuy()">محاسبه خرید</button>

      <div class="result" id="buyResultBox">
        <h3>قیمت نهایی خرید</h3>
        <div class="price" id="buyFinalPrice">0 تومان</div>
      </div>

      <div class="hint">
        فرمول خرید:
        <br />
        وزن × قیمت هر گرم ۲۴ عیار × (عیار ÷ ۲۴)
      </div>
    </div>

    <!-- تب فروش -->
    <div class="tab-content" id="sellTab">
      <div class="form-group">
        <label for="sellPrice">قیمت طلا (هر گرم)</label>
        <!-- مهم: type=text تا بتوانیم , داخلش نمایش دهیم -->
        <input type="text" id="sellPrice" inputmode="numeric" placeholder="مثلاً 1,234,567" />
      </div>

      <div class="form-group">
        <label for="sellWeight">وزن (گرم)</label>
        <input type="text" id="sellWeight" inputmode="decimal" placeholder="مثلاً 1" />
      </div>

      <div class="form-group">
        <label for="sellFee">درصد کارمزد</label>
        <input type="number" id="sellFee" placeholder="مثلاً 10" step="0.01" />
      </div>

      <div class="form-group">
        <label for="sellProfit">درصد سود</label>
        <input type="number" id="sellProfit" value="7" placeholder="مثلاً 7" step="0.01" />
      </div>

      <button class="btn" onclick="calculateSell()">محاسبه فروش</button>

      <div class="result" id="sellResultBox">
        <h3>قیمت نهایی فروش</h3>
        <div class="price" id="sellFinalPrice">0 تومان</div>
        <div class="details" id="sellDetails"></div>
      </div>

      <div class="hint">
        فرمول فروش:
        <br />
        مبلغ پایه = قیمت × وزن
        <br />
        بعد از کارمزد = مبلغ پایه × (1 + کارمزد٪)
        <br />
        بعد از سود = بعد از کارمزد × (1 + سود٪)
      </div>
    </div>
  </div>

  <script>
    // ---------- تنظیمات اولیه ----------
    const DEFAULT_TAB = 'sell';    // 'sell' یا 'buy'
    const DEFAULT_THEME = 'light';  // 'dark' یا 'light'

    function formatNumber(num) {
      return new Intl.NumberFormat('fa-IR', { maximumFractionDigits: 4 }).format(num);
    }

    // جداکننده هزارگان با کاما (برای ورودی قیمت)
    function addCommasToNumberString(str) {
      // فقط رقم‌ها را نگه دار
      const digits = String(str).replace(/[^\d]/g, '');
      if (!digits) return '';
      return digits.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    }

    function parseCommaNumber(str) {
      // "1,234,567" -> 1234567
      const digits = String(str).replace(/,/g, '').replace(/[^\d.]/g, '');
      return digits ? parseFloat(digits) : NaN;
    }

    function attachPriceCommaFormatting(inputId) {
      const el = document.getElementById(inputId);
      if (!el) return;

      el.addEventListener('input', () => {
        const formatted = addCommasToNumberString(el.value);
        el.value = formatted;
      });

      // اختیاری: وقتی از فیلد خارج شد هم تمیزش کن
      el.addEventListener('blur', () => {
        el.value = addCommasToNumberString(el.value);
      });
    }

    function switchTab(tab) {
      document.getElementById('buyBtn').classList.remove('active');
      document.getElementById('sellBtn').classList.remove('active');
      document.getElementById('buyTab').classList.remove('active');
      document.getElementById('sellTab').classList.remove('active');

      if (tab === 'buy') {
        document.getElementById('buyBtn').classList.add('active');
        document.getElementById('buyTab').classList.add('active');
      } else {
        document.getElementById('sellBtn').classList.add('active');
        document.getElementById('sellTab').classList.add('active');
      }
    }

    function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      document.getElementById('themeLabel').textContent = (theme === 'light') ? 'لایت' : 'دارک';
    }

    function toggleTheme() {
      const current = document.body.getAttribute('data-theme') || 'dark';
      const next = (current === 'dark') ? 'light' : 'dark';
      setTheme(next);
    }

    function calculateBuy() {
      const basePrice = parseFloat(document.getElementById("buyBasePrice").value);
      const weight = parseFloat(document.getElementById("buyWeight").value);
      const karat = parseFloat(document.getElementById("buyKarat").value);

      if (isNaN(basePrice) || isNaN(weight) || isNaN(karat)) {
        alert("لطفاً همه فیلدهای بخش خرید را به‌درستی پر کنید.");
        return;
      }

      const final = weight * basePrice * (karat / 24);

      document.getElementById("buyFinalPrice").innerText = formatNumber(final) + " تومان";
      document.getElementById("buyResultBox").style.display = "block";
    }

    function calculateSell() {
      // قیمت را با حذف کاما می‌خوانیم
      const price = parseCommaNumber(document.getElementById("sellPrice").value);
      const weight = parseFloat(document.getElementById("sellWeight").value);
      const feeRaw = document.getElementById("sellFee").value.trim();
      const feePercent = feeRaw === "" ? 0 : parseFloat(feeRaw);
      const profitPercent = parseFloat(document.getElementById("sellProfit").value);

      if (isNaN(price) || isNaN(weight) || isNaN(profitPercent) || isNaN(feePercent)) {
        alert("لطفاً همه فیلدهای بخش فروش را به‌درستی پر کنید.");
        return;
      }

      const baseAmount = price * weight;
      const afterFee = baseAmount * (1 + feePercent / 100);
      const finalAmount = afterFee * (1 + profitPercent / 100);

      const feeAmount = afterFee - baseAmount;
      const profitAmount = finalAmount - afterFee;

      document.getElementById("sellFinalPrice").innerText = formatNumber(finalAmount) + " تومان";
      document.getElementById("sellDetails").innerHTML = `
        مبلغ پایه (قیمت × وزن): ${formatNumber(baseAmount)} تومان<br>
        مبلغ کارمزد (${feePercent}%): ${formatNumber(feeAmount)} تومان<br>
        بعد از کارمزد: ${formatNumber(afterFee)} تومان
        <hr>
        مبلغ سود (${profitPercent}%): ${formatNumber(profitAmount)} تومان<br>
        قیمت نهایی: ${formatNumber(finalAmount)} تومان
      `;

      document.getElementById("sellResultBox").style.display = "block";
    }
// ===================================================================================
    function enableEnterToCalculate() {
      const buyInputs = document.querySelectorAll('#buyTab input');
      const sellInputs = document.querySelectorAll('#sellTab input');

      buyInputs.forEach(input => {
        input.addEventListener('keydown', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            calculateBuy();
          }
        });
      });

      sellInputs.forEach(input => {
        input.addEventListener('keydown', function(event) {
          if (event.key === 'Enter') {
            event.preventDefault();
            calculateSell();
          }
        });
      });
    }
// ===================================================================================
    function enableFastZeroShortcut(inputId) {
        const input = document.getElementById(inputId);
        if (!input) return;

        input.addEventListener('keydown', function(e) {
            // اگر کلید زده شده "." (نقطه) باشد
            if (e.key === '.') {
                e.preventDefault(); // جلوگیری از تایپ نقطه
                // اضافه کردن سه صفر به مقدار فعلی
                const rawValue = parseCommaNumber(input.value);
                input.value = addCommasToNumberString((rawValue * 1000).toString());
            }
        });
    }
// ===================================================================================
    function enableZeroBeforeDecimalForWeight() {
      const weightInputs = [
        document.getElementById('sellWeight'),
        document.getElementById('buyWeight')
      ].filter(Boolean);

      weightInputs.forEach(input => {
        input.addEventListener('input', () => {
          let value = input.value;

          // اگر کاربر فقط "." نوشت => "0."
          if (value === '.') {
            input.value = '0.';
            return;
          }

          // اگر اول عدد "." بود مثل ".5" => "0.5"
          if (value.startsWith('.')) {
            input.value = '0' + value;
          }
        });
      });
    }
// ===================================================================================
    function enableAutoSelectOnFocus(inputId) {
      const input = document.getElementById(inputId);
      if (!input) return;

      input.addEventListener('focus', () => {
        input.select();
      });
    }
// ===================================================================================
    (function init() {
      setTheme(DEFAULT_THEME);
      switchTab(DEFAULT_TAB);
      attachPriceCommaFormatting('sellPrice');
      enableEnterToCalculate();
      enableFastZeroShortcut('sellPrice');
      enableZeroBeforeDecimalForWeight();
      enableAutoSelectOnFocus('sellProfit');
    })();
  </script>
</body>
</html>
